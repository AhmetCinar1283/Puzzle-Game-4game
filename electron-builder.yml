appId: com.syncron.app
productName: Syncron

directories:
  output: dist-electron

# Include the static export + electron entry files
files:
  - out/**/*
  - electron/**/*
  - package.json
  - "!node_modules/**/*"

# Don't pack into asar — Next.js static files must be accessible via file://
asar: false

win:
  target:
    - target: nsis
      arch:
        - x64
  forceCodeSigning: false

mac:
  target: dmg

linux:
  target: AppImage

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Syncron
